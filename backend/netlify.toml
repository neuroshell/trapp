[build]
  # Install dependencies
  install_command = "npm install"

  # No build step needed - just install deps
  command = "echo 'Backend ready'"

  # Deploy from backend root
  publish = "."

[functions]
  # Directory containing Netlify functions
  directory = "functions"

  # Use esbuild for bundling
  node_bundler = "esbuild"

  # Include data files
  included_files = ["data/**"]

  # External modules (installed at runtime, not bundled)
  external_node_modules = ["express", "cors", "helmet", "serverless-http", "bcryptjs", "jsonwebtoken", "lowdb", "express-rate-limit", "express-validator", "dotenv"]

# Redirect all API requests to the function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CORS headers
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
