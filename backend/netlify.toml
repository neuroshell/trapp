[build]
  # Install dependencies
  install_command = "npm install"
  
  # Build command (none needed for Node.js)
  command = "echo 'Backend build complete'"
  
  # Directory to deploy (functions folder)
  publish = "netlify"

[functions]
  # Directory containing Netlify functions
  directory = "netlify/functions"

  # Node.js version
  node_bundler = "esbuild"

  # Include all dependencies
  included_files = ["data/**"]

  # External node modules (not bundled, installed at runtime)
  external_node_modules = ["lowdb", "bcryptjs", "jsonwebtoken", "express", "cors", "helmet", "express-rate-limit", "express-validator", "dotenv"]

# Redirect all API requests to the function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Environment variables (set these in Netlify UI)
# JWT_SECRET=your-secret-key
# NODE_ENV=production
# ALLOWED_ORIGINS=https://your-domain.com
# BCRYPT_ROUNDS=10
# JWT_EXPIRY=30d
# RATE_LIMIT_WINDOW_MS=60000
# RATE_LIMIT_MAX_REQUESTS=100
# LOG_LEVEL=info
# DB_FILE=/var/task/data/db.json

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# CORS headers (adjust for your domain)
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Headers = "Content-Type, Authorization"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
