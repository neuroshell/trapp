# Trapp Tracker - Web CD Pipeline
# Builds and deploys the Expo web app to GitHub Pages
# Supports preview deployments for PRs

name: CD - Web Deploy

on:
  # Deploy on push to main
  push:
    branches:
      - main

  # Preview deployments for PRs
  pull_request:
    branches:
      - main
      - develop

  # Manual trigger
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment Environment"
        required: true
        type: choice
        options:
          - production
          - staging
          - preview
        default: "preview"

env:
  NODE_VERSION: "20"
  CACHE_VERSION: "v1"

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # BUILD WEB APP
  # ===========================================
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      build-hash: ${{ steps.build.outputs.hash }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build Expo Web App
        id: build
        run: |
          npx expo export:web
          BUILD_HASH=$(git rev-parse --short HEAD)
          echo "hash=${BUILD_HASH}" >> $GITHUB_OUTPUT
        env:
          CI: true

      - name: Create 404.html for SPA routing
        run: |
          cp web-build/index.html web-build/404.html

      - name: Create asset manifest for caching
        run: |
          echo "Build completed at: $(date -u)" > web-build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> web-build/BUILD_INFO.txt
          echo "Version: ${{ steps.version.outputs.version }}" >> web-build/BUILD_INFO.txt

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: web-build/
          retention-days: 14

      - name: Upload build for preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-build/

  # ===========================================
  # DEPLOY TO GITHUB PAGES (MAIN)
  # ===========================================
  deploy-production:
    name: Deploy to GitHub Pages (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-web
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web-build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./web-build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify deployment success
        if: success()
        run: |
          echo "## ✅ Web Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL**: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ needs.build-web.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # PREVIEW DEPLOYMENT (PR)
  # ===========================================
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-web
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web-build

      - name: Deploy to Netlify Preview (alternative)
        id: netlify-preview
        continue-on-error: true
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          if [ -n "$NETLIFY_SITE_ID" ]; then
            npx netlify-cli deploy --dir=web-build --message="Preview for PR #${{ github.event.pull_request.number }}" --json > deploy-output.json 2>/dev/null || true
            if [ -f deploy-output.json ]; then
              PREVIEW_URL=$(cat deploy-output.json | jq -r '.deploy_url' 2>/dev/null || echo "")
              if [ -n "$PREVIEW_URL" ]; then
                echo "url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
              fi
            fi
          fi

      - name: Comment on PR with preview link
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const commitSha = context.sha;
            const buildVersion = '${{ needs.build-web.outputs.version }}';
            const previewUrl = '${{ steps.netlify-preview.outputs.url }}';
            const pagesUrl = 'https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/';

            let commentBody = `## 🌐 Web Preview Deployment\n\n`;
            commentBody += `| Property | Value |\n`;
            commentBody += `|----------|-------|\n`;
            commentBody += `| **Commit** | \`${commitSha.substring(0, 7)}\` |\n`;
            commentBody += `| **Version** | ${buildVersion} |\n`;
            commentBody += `| **PR** | #${prNumber} |\n`;

            if (previewUrl) {
              commentBody += `| **Preview URL** | [${previewUrl}](${previewUrl}) |\n`;
            } else {
              commentBody += `| **GitHub Pages** | Will be available at merge |\n`;
            }

            commentBody += `\n---\n*Automated deployment preview from GitHub Actions*`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const existingComment = comments.find(c => 
              c.user.type === 'Bot' && c.body.includes('Web Preview Deployment')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

  # ===========================================
  # DEPLOY TO ALTERNATIVE HOSTING (OPTIONAL)
  # ===========================================
  deploy-alternative:
    name: Deploy to Vercel/Netlify (Optional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-web
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: ./web-build

      - name: Check for Vercel credentials
        id: vercel-check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.vercel-check.outputs.has-token == 'true'
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./web-build
          vercel-args: "--prod"

      - name: Check for Netlify credentials
        id: netlify-check
        run: |
          if [ -n "${{ secrets.NETLIFY_AUTH_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Netlify
        if: steps.netlify-check.outputs.has-token == 'true'
        uses: nwtgck/actions-netlify@v3
        with:
          publish_dir: ./web-build
          production_branch: main
          github_token: ${{ secrets.GITHUB_TOKEN }}
          deploy_message: "Deploy web app ${{ needs.build-web.outputs.version }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ===========================================
  # HEALTH CHECK
  # ===========================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: deploy-production
    if: always() && needs.deploy-production.result == 'success'

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Check deployment health
        run: |
          echo "## Health Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Pages URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "- Build Version: ${{ needs.build-web.outputs.version }}"
          echo "- Commit: ${{ github.sha }}"
