# Trapp Tracker - Continuous Integration Pipeline
# Runs on every pull request and push to main/develop branches
# Ensures code quality through linting, type checking, and testing

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: "20"
  CACHE_VERSION: "v1"

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # LINT JOB
  # ===========================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      lint-result: ${{ steps.lint-step.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install root dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install backend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd backend
          npm ci

      - name: Run ESLint (root)
        id: lint-step
        run: npm run lint
        continue-on-error: true

      - name: Run ESLint (backend)
        run: |
          cd backend
          npx eslint . --ext .js,.ts 2>/dev/null || echo "No ESLint configured for backend"

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: |
            lint-results.json
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================
  # TYPE CHECK JOB
  # ===========================================
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run TypeScript compiler check (app only)
        run: npx tsc --noEmit --project tsconfig.ci.json --skipLibCheck
        continue-on-error: false

      - name: Type check summary
        run: echo "✅ TypeScript type check passed"

  # ===========================================
  # TEST JOB - APP
  # ===========================================
  test-app:
    name: Test - App (React Native)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Jest tests (App)
        run: npm run test:app -- --coverage --ci
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-app
          path: |
            junit.xml
            coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: app
          name: app-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================
  # TEST JOB - BACKEND
  # ===========================================
  test-backend:
    name: Test - Backend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install backend dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: npm run test:backend
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: |
            backend/test-results.xml
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================
  # BUILD JOB
  # ===========================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-app, test-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create build directory
        run: mkdir -p build/artifacts

      - name: Build web version (Expo)
        run: npx expo export -p web
        env:
          CI: true

      - name: Copy web build to artifacts
        run: |
          cp -r dist/* build/artifacts/ || echo "Web build not found, skipping..."

      - name: Create build manifest
        run: |
          echo "Build Information" > build/BUILD_INFO.txt
          echo "=================" >> build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> build/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> build/BUILD_INFO.txt
          echo "Build Time: $(date -u)" >> build/BUILD_INFO.txt
          echo "Build Number: ${{ github.run_number }}" >> build/BUILD_INFO.txt
          echo "Triggered By: ${{ github.actor }}" >> build/BUILD_INFO.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/
          retention-days: 14

  # ===========================================
  # COVERAGE SUMMARY JOB
  # ===========================================
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-app, test-backend]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results-app
          path: ./coverage-artifacts

      - name: Install coverage tools
        run: npm install -g lcov-parse

      - name: Generate coverage summary
        id: coverage
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          LCOV_FILE="./coverage-artifacts/coverage/lcov.info"
          FINAL_JSON="./coverage-artifacts/coverage/coverage-final.json"

          if [ -f "$LCOV_FILE" ]; then
            echo "### Overall Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Parse LCOV for summary statistics
            TOTAL_LINES=$(grep -c "^DA:" "$LCOV_FILE" 2>/dev/null || echo "0")
            HIT_LINES=$(grep "^DA:" "$LCOV_FILE" | awk -F, '$2 > 0' | wc -l 2>/dev/null || echo "0")
            
            TOTAL_FUNCS=$(grep -c "^FNDA:" "$LCOV_FILE" 2>/dev/null || echo "0")
            HIT_FUNCS=$(grep "^FNDA:" "$LCOV_FILE" | awk -F, '$2 > 0' | wc -l 2>/dev/null || echo "0")
            
            TOTAL_BRANCHES=$(grep -c "^BRDA:" "$LCOV_FILE" 2>/dev/null || echo "0")
            HIT_BRANCHES=$(grep "^BRDA:" "$LCOV_FILE" | awk -F, '$2 > 0' | wc -l 2>/dev/null || echo "0")

            if [ "$TOTAL_LINES" -gt 0 ]; then
              LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($HIT_LINES/$TOTAL_LINES)*100}")
              echo "| Metric | Covered | Total | Percentage |" >> $GITHUB_STEP_SUMMARY
              echo "|--------|---------|-------|------------|" >> $GITHUB_STEP_SUMMARY
              echo "| 📝 Lines | $HIT_LINES | $TOTAL_LINES | ${LINE_PCT}% |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "$TOTAL_FUNCS" -gt 0 ]; then
              FUNC_PCT=$(awk "BEGIN {printf \"%.1f\", ($HIT_FUNCS/$TOTAL_FUNCS)*100}")
              echo "| 🔄 Functions | $HIT_FUNCS | $TOTAL_FUNCS | ${FUNC_PCT}% |" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ "$TOTAL_BRANCHES" -gt 0 ]; then
              BRANCH_PCT=$(awk "BEGIN {printf \"%.1f\", ($HIT_BRANCHES/$TOTAL_BRANCHES)*100}")
              echo "| 🔀 Branches | $HIT_BRANCHES | $TOTAL_BRANCHES | ${BRANCH_PCT}% |" >> $GITHUB_STEP_SUMMARY
            fi
            
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$FINAL_JSON" ]; then
            echo "### Coverage by File" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            # Copy parse script to temp location
            cp ./scripts/parse-coverage.js /tmp/parse-coverage.js
            node /tmp/parse-coverage.js "$FINAL_JSON" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "### 📁 Coverage Files" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY

          if [ -f "$LCOV_FILE" ]; then
            LCOV_SIZE=$(wc -c < "$LCOV_FILE")
            echo "| lcov.info | ${LCOV_SIZE} bytes | LCOV format (Codecov) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "$FINAL_JSON" ]; then
            JSON_SIZE=$(wc -c < "$FINAL_JSON")
            echo "| coverage-final.json | ${JSON_SIZE} bytes | JSON report |" >> $GITHUB_STEP_SUMMARY
          fi

          COBERTURA_FILE="./coverage-artifacts/coverage/cobertura-coverage.xml"
          if [ -f "$COBERTURA_FILE" ]; then
            COB_SIZE=$(wc -c < "$COBERTURA_FILE")
            echo "| cobertura-coverage.xml | ${COB_SIZE} bytes | Cobertura XML |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 💡 Download Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To download the full coverage reports:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the workflow run page" >> $GITHUB_STEP_SUMMARY
          echo "2. Scroll to **Artifacts** section" >> $GITHUB_STEP_SUMMARY
          echo "3. Click on \`test-results-app\`" >> $GITHUB_STEP_SUMMARY
          echo "4. Extract and open \`coverage/lcov-report/index.html\` in a browser" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # STATUS CHECK JOB
  # ===========================================
  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-app, test-backend, build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Test App: ${{ needs.test-app.result }}"
          echo "Test Backend: ${{ needs.test-backend.result }}"
          echo "Build: ${{ needs.build.result }}"

      - name: Fail if any required job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.type-check.result == 'failure' ||
          needs.test-app.result == 'failure' ||
          needs.test-backend.result == 'failure' ||
          needs.build.result == 'failure'
        run: exit 1
