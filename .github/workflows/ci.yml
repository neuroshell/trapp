# Trapp Tracker - Continuous Integration Pipeline
# Runs on every pull request and push to main/develop branches
# Ensures code quality through linting, type checking, and testing

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '20'
  CACHE_VERSION: 'v1'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # LINT JOB
  # ===========================================
  lint:
    name: Lint & Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      lint-result: ${{ steps.lint-step.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-node-modules
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install root dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Install backend dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd backend
          npm ci

      - name: Run ESLint (root)
        id: lint-step
        run: npm run lint
        continue-on-error: true

      - name: Run ESLint (backend)
        run: |
          cd backend
          npx eslint . --ext .js,.ts 2>/dev/null || echo "No ESLint configured for backend"

      - name: Upload lint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: |
            lint-results.json
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================
  # TYPE CHECK JOB
  # ===========================================
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run TypeScript compiler check (app only)
        run: npx tsc --noEmit --project tsconfig.ci.json --skipLibCheck
        continue-on-error: false

      - name: Type check summary
        run: echo "✅ TypeScript type check passed"

  # ===========================================
  # TEST JOB - APP
  # ===========================================
  test-app:
    name: Test - App (React Native)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Jest tests (App)
        run: npm run test:app -- --coverage --ci
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-app
          path: |
            junit.xml
            coverage/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: app
          name: app-coverage
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ===========================================
  # TEST JOB - BACKEND
  # ===========================================
  test-backend:
    name: Test - Backend (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [lint, type-check]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install backend dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: npm run test:backend
        env:
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-backend
          path: |
            backend/test-results.xml
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================
  # BUILD JOB
  # ===========================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [test-app, test-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Restore node_modules cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            backend/node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ env.CACHE_VERSION }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies (if cache miss)
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Create build directory
        run: mkdir -p build/artifacts

      - name: Build web version (Expo)
        run: npx expo export -p web
        env:
          CI: true

      - name: Copy web build to artifacts
        run: |
          cp -r dist/* build/artifacts/ || echo "Web build not found, skipping..."

      - name: Create build manifest
        run: |
          echo "Build Information" > build/BUILD_INFO.txt
          echo "=================" >> build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> build/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> build/BUILD_INFO.txt
          echo "Build Time: $(date -u)" >> build/BUILD_INFO.txt
          echo "Build Number: ${{ github.run_number }}" >> build/BUILD_INFO.txt
          echo "Triggered By: ${{ github.actor }}" >> build/BUILD_INFO.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            build/
          retention-days: 14

  # ===========================================
  # COVERAGE SUMMARY JOB
  # ===========================================
  coverage-summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [test-app, test-backend]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-results-app
          path: ./coverage-artifacts

      - name: Generate coverage summary
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "./coverage-artifacts/coverage/lcov.info" ]; then
            echo "### Coverage Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            # Extract summary from lcov if available
            if command -v lcov &> /dev/null; then
              lcov --list ./coverage-artifacts/coverage/lcov.info >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            else
              echo "Coverage file: lcov.info ($(wc -c < ./coverage-artifacts/coverage/lcov.info) bytes)" >> $GITHUB_STEP_SUMMARY
            fi
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "./coverage-artifacts/coverage/coverage-final.json" ]; then
            echo "### Coverage Details" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Coverage file: coverage-final.json" >> $GITHUB_STEP_SUMMARY
            echo "- Size: $(wc -c < ./coverage-artifacts/coverage/coverage-final.json) bytes" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Download coverage reports from the workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Look for: \`test-results-app\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # STATUS CHECK JOB
  # ===========================================
  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [lint, type-check, test-app, test-backend, build]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Test App: ${{ needs.test-app.result }}"
          echo "Test Backend: ${{ needs.test-backend.result }}"
          echo "Build: ${{ needs.build.result }}"

      - name: Fail if any required job failed
        if: |
          needs.lint.result == 'failure' ||
          needs.type-check.result == 'failure' ||
          needs.test-app.result == 'failure' ||
          needs.test-backend.result == 'failure' ||
          needs.build.result == 'failure'
        run: exit 1
