# Trapp Tracker - Mobile CD Pipeline
# Builds and submits iOS/Android apps using EAS Build
# Triggered on version tags (v*) or manual dispatch

name: CD - Mobile Build & Deploy

on:
  # Trigger on version tags
  push:
    tags:
      - 'v*'
  
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - production
          - preview
        default: 'preview'
      platform:
        description: 'Platform'
        required: true
        type: choice
        options:
          - both
          - ios
          - android
        default: 'both'
      profile:
        description: 'EAS Build Profile'
        required: true
        type: choice
        options:
          - production
          - development
        default: 'production'
      submit_to_store:
        description: 'Submit to App Store'
        required: false
        type: boolean
        default: false

env:
  NODE_VERSION: '18'
  EAS_VERSION: 'latest'

jobs:
  # ===========================================
  # PRE-BUILD VALIDATION
  # ===========================================
  validate:
    name: Validate Build Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag or package.json
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
            echo "tag=${VERSION}" >> $GITHUB_OUTPUT
            echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
            echo "version=${VERSION}" >> $GITHUB_OUTPUT
          fi
          echo "Building version: ${{ steps.version.outputs.version }}"

      - name: Verify EAS configuration
        run: |
          if [ ! -f "eas.json" ]; then
            echo "Error: eas.json not found. Please create EAS configuration."
            exit 1
          fi
          echo "EAS configuration found"

      - name: Notify build starting
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Trapp Tracker mobile build starting for version ${{ steps.version.outputs.version }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

  # ===========================================
  # IOS BUILD
  # ===========================================
  build-ios:
    name: Build iOS App
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: validate
    if: |
      github.event.inputs.platform == 'both' || 
      github.event.inputs.platform == 'ios' || 
      startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Configure EAS
        run: |
          echo "EAS CLI installed: $(eas --version)"

      - name: Build iOS with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "${{ github.event.inputs.profile }}" == "development" ]]; then
            eas build --platform ios --profile development --non-interactive --no-wait
          else
            eas build --platform ios --profile production --non-interactive --no-wait
          fi
        continue-on-error: true

      - name: Build iOS (alternative method)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Alternative: Use eas build with local credentials
          eas build --platform ios --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
        continue-on-error: true

      - name: Download iOS build artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: ios-build
          path: ./builds/ios/

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ needs.validate.outputs.version }}
          path: |
            builds/ios/*.ipa
            builds/ios/*.app
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================
  # ANDROID BUILD
  # ===========================================
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: validate
    if: |
      github.event.inputs.platform == 'both' || 
      github.event.inputs.platform == 'android' || 
      startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build Android with EAS
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
        run: |
          if [[ "${{ github.event.inputs.profile }}" == "development" ]]; then
            eas build --platform android --profile development --non-interactive --no-wait
          else
            eas build --platform android --profile production --non-interactive --no-wait
          fi
        continue-on-error: true

      - name: Build Android (alternative method)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
        continue-on-error: true

      - name: Download Android build artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: android-build
          path: ./builds/android/

      - name: Upload Android build
        uses: actions/upload-artifact@v4
        with:
          name: android-app-${{ needs.validate.outputs.version }}
          path: |
            builds/android/*.apk
            builds/android/*.aab
          retention-days: 30
          if-no-files-found: ignore

  # ===========================================
  # SUBMIT TO APP STORES
  # ===========================================
  submit-ios:
    name: Submit to TestFlight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, build-ios]
    if: |
      (github.event.inputs.submit_to_store == 'true' || startsWith(github.ref, 'refs/tags/')) &&
      needs.build-ios.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Submit to TestFlight
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          eas submit --platform ios --latest --non-interactive
        continue-on-error: true

  submit-android:
    name: Submit to Google Play
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [validate, build-android]
    if: |
      (github.event.inputs.submit_to_store == 'true' || startsWith(github.ref, 'refs/tags/')) &&
      needs.build-android.result == 'success'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Submit to Google Play Internal
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
        run: |
          eas submit --platform android --latest --non-interactive
        continue-on-error: true

  # ===========================================
  # BUILD NOTIFICATION
  # ===========================================
  notify:
    name: Build Notification
    runs-on: ubuntu-latest
    needs: [validate, build-ios, build-android, submit-ios, submit-android]
    if: always()

    steps:
      - name: Determine build status
        id: status
        run: |
          if [[ "${{ needs.build-ios.result }}" == "success" && "${{ needs.build-android.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
        run: |
          STATUS="${{ steps.status.outputs.status }}"
          EMOJI="${{ steps.status.outputs.emoji }}"
          VERSION="${{ needs.validate.outputs.version }}"
          
          if [ "$STATUS" == "success" ]; then
            MESSAGE="${EMOJI} Trapp Tracker mobile build *SUCCESS* for version ${VERSION}"
          else
            MESSAGE="${EMOJI} Trapp Tracker mobile build *FAILED* for version ${VERSION}"
          fi
          
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"${MESSAGE}\", \"blocks\":[{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"${MESSAGE}\"}}]}" \
            ${{ secrets.SLACK_WEBHOOK_URL }} || echo "Slack notification skipped"

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/') && steps.status.outputs.status == 'success'
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Trapp Tracker ${{ github.ref_name }}
            
            ### What's New
            - iOS and Android builds generated via EAS Build
            - Build artifacts available in GitHub Actions
            
            ### Installation
            - iOS: Available via TestFlight
            - Android: Available via Google Play Internal Testing
            
            ---
            *Automated release from CI/CD pipeline*
          draft: false
          prerelease: false
          files: |
            builds/ios/*.ipa
            builds/android/*.apk
            builds/android/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on related issues/PRs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ needs.validate.outputs.version }}';
            const status = '${{ steps.status.outputs.status }}';
            const emoji = '${{ steps.status.outputs.emoji }}';
            
            console.log(`Build ${status} for version ${version} ${emoji}`);
