name: Agentic SDLC Pipeline

on:
  # Trigger on issue events
  issues:
    types:
      - labeled # When a label is added (e.g., backlog-item)
      - unlabeled # When approval label is added

  # Manual trigger
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Specific issue number to process (optional)"
        required: false
        type: number
      dry_run:
        description: "Run in dry-run mode (no changes made)"
        required: false
        type: boolean
        default: false

  # Scheduled run (every hour)
  schedule:
    - cron: "0 * * * *" # Every hour

  # Push to main branch (for continuous processing)
  push:
    branches:
      - main

env:
  NODE_VERSION: "20"

jobs:
  process-backlog:
    name: Process Backlog Items
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check for GitHub token
        id: token-check
        run: |
          if [ -n "${{ secrets.GITHUB_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
            echo "::warning::GitHub token not configured. Skipping backlog processing."
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
        if: steps.token-check.outputs.has-token == 'true'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
        if: steps.token-check.outputs.has-token == 'true'

      - name: Install dependencies
        run: npm ci

      - name: Install ts-node and commander (for agent scripts)
        run: npm install -D ts-node commander @types/node @types/commander

      - name: Run agent pipeline
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -n "${{ github.event.inputs.issue_number }}" ]; then
            echo "Processing specific issue #${{ github.event.inputs.issue_number }}"
            npm run agents:process -- --issue=${{ github.event.inputs.issue_number }} --verbose
          elif [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "Running in dry-run mode"
            npm run agents:process -- --dry-run --verbose
          else
            echo "Processing all ready backlog items"
            npm run agents:process -- --verbose
          fi

      - name: Commit and push changes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Agent pipeline: Auto-commit changes"
          commit_user_name: GitHub Agent Bot
          commit_user_email: agent-bot@github.com
          create_branch: true
          branch: "agent-pipeline/auto-${{ github.run_id }}"
          push_options: "--set-upstream"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-pull-request:
    name: Create Pull Request
    runs-on: ubuntu-latest
    needs: process-backlog
    if: ${{ github.ref != 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "agent-pipeline/auto-${{ github.run_id }}"
          base: main
          title: "🤖 Agent Pipeline: Automated Changes"
          body: |
            This PR was automatically generated by the Agentic SDLC Pipeline.

            ## Changes
            - Automated code generation from agent workflow
            - Please review all changes carefully before merging

            ## Pipeline Run
            - Run ID: ${{ github.run_id }}
            - Triggered by: ${{ github.triggering_actor }}

            ---
            ⚠️ **Review Required**: Please review all generated code before merging.
          labels: |
            automated-pr
            agent-pipeline
          assignees: ${{ github.triggering_actor }}
          draft: false

  notify-failures:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [process-backlog]
    if: failure()

    steps:
      - name: Comment on affected issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          echo "Pipeline failed - notification would be sent here"
          # Add custom notification logic (Slack, Discord, email, etc.)
