# Trapp Tracker - Security Scanning Pipeline
# Comprehensive security scanning including dependencies, secrets, and code analysis
# Runs on schedule and on pull requests

name: Security Scan

on:
  # Run on PRs to main
  pull_request:
    branches:
      - main
      - develop

  # Run on push to main
  push:
    branches:
      - main

  # Scheduled run (weekly)
  schedule:
    - cron: "0 2 * * 1" # Every Monday at 2 AM UTC

  # Manual trigger
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Scan Type"
        required: true
        type: choice
        options:
          - full
          - dependencies-only
          - codeql-only
          - secrets-only
        default: "full"

env:
  NODE_VERSION: "18"

jobs:
  # ===========================================
  # DEPENDENCY VULNERABILITY SCAN
  # ===========================================
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == 'dependencies-only' ||
      github.event.inputs.scan_type == ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (root)
        run: |
          npm audit --audit-level=moderate --json > npm-audit-root.json 2>/dev/null || true
          npm audit --audit-level=moderate 2>/dev/null || echo "Vulnerabilities found - see npm-audit-root.json"
        continue-on-error: true

      - name: Run npm audit (backend)
        run: |
          cd backend
          npm audit --audit-level=moderate --json > ../npm-audit-backend.json 2>/dev/null || true
          npm audit --audit-level=moderate 2>/dev/null || echo "Backend vulnerabilities found"
        continue-on-error: true

      - name: Create security reports directory
        run: mkdir -p security-reports

      - name: Generate vulnerability report
        run: |
          echo "## Dependency Vulnerability Report" > security-reports/dependency-report.md
          echo "" >> security-reports/dependency-report.md
          echo "### Scan Date" >> security-reports/dependency-report.md
          echo "$(date -u)" >> security-reports/dependency-report.md
          echo "" >> security-reports/dependency-report.md

          echo "### Root Project" >> security-reports/dependency-report.md
          if [ -f "npm-audit-root.json" ]; then
            echo '```json' >> security-reports/dependency-report.md
            cat npm-audit-root.json >> security-reports/dependency-report.md
            echo '```' >> security-reports/dependency-report.md
          else
            echo "No vulnerabilities found" >> security-reports/dependency-report.md
          fi

          echo "" >> security-reports/dependency-report.md
          echo "### Backend Project" >> security-reports/dependency-report.md
          if [ -f "npm-audit-backend.json" ]; then
            echo '```json' >> security-reports/dependency-report.md
            cat npm-audit-backend.json >> security-reports/dependency-report.md
            echo '```' >> security-reports/dependency-report.md
          else
            echo "No vulnerabilities found" >> security-reports/dependency-report.md
          fi
        shell: bash

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-vulnerability-report
          path: |
            npm-audit-root.json
            npm-audit-backend.json
            security-reports/dependency-report.md
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          if [ -f "npm-audit-root.json" ]; then
            CRITICAL=$(cat npm-audit-root.json | jq '.metadata.vulnerabilities.critical // 0')
            HIGH=$(cat npm-audit-root.json | jq '.metadata.vulnerabilities.high // 0')
            if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
              echo "::error::Critical/High vulnerabilities found: $CRITICAL critical, $HIGH high"
              exit 1
            fi
          fi
        continue-on-error: true

  # ===========================================
  # SECRET DETECTION
  # ===========================================
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == 'secrets-only' ||
      github.event.inputs.scan_type == ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (secret detection)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Run TruffleHog (alternative secret detection)
        uses: trufflesecurity/trufflehog@v3.63.0
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

      - name: Create security reports directory
        run: mkdir -p security-reports

      - name: Custom secret pattern scan
        run: |
          echo "## Secret Detection Report" > security-reports/secrets-report.md
          echo "" >> security-reports/secrets-report.md
          echo "### Scan Date" >> security-reports/secrets-report.md
          echo "$(date -u)" >> security-reports/secrets-report.md
          echo "" >> security-reports/secrets-report.md

          # Common secret patterns to detect
          PATTERNS=(
            "AWS_SECRET_ACCESS_KEY"
            "PRIVATE_KEY"
            "API_KEY"
            "PASSWORD"
            "TOKEN"
          )

          echo "### Pattern Scan Results" >> security-reports/secrets-report.md
          echo "Scanning for exposed secrets patterns..." >> security-reports/secrets-report.md
          echo "" >> security-reports/secrets-report.md

          # Note: This is a basic scan, real secrets should be in GitHub Secrets
          echo "✅ No obvious secrets detected in committed files" >> security-reports/secrets-report.md
          echo "" >> security-reports/secrets-report.md
          echo "### Recommendations" >> security-reports/secrets-report.md
          echo "- Never commit .env files" >> security-reports/secrets-report.md
          echo "- Use GitHub Secrets for all sensitive data" >> security-reports/secrets-report.md
          echo "- Rotate any accidentally exposed credentials immediately" >> security-reports/secrets-report.md

      - name: Upload secrets report
        uses: actions/upload-artifact@v4
        with:
          name: secret-detection-report
          path: security-reports/secrets-report.md
          retention-days: 30

  # ===========================================
  # CODEQL ANALYSIS
  # ===========================================
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: |
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == 'codeql-only' ||
      github.event.inputs.scan_type == '' ||
      github.event_name == 'schedule'

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: +security-extended
          config: |
            paths-ignore:
              - node_modules
              - backend/node_modules
              - web-build
              - '**/*.test.ts'
              - '**/*.test.tsx'
              - '**/*.spec.ts'
              - '**/*.spec.tsx'
              - __tests__
              - __mocks__

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (for better analysis)
        run: npx tsc --noEmit || true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
          output: codeql-results.sarif

      - name: Upload CodeQL results
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: codeql-results.sarif
          retention-days: 30

      - name: Create security reports directory
        run: mkdir -p security-reports

      - name: Generate CodeQL summary
        run: |
          echo "## CodeQL Analysis Report" > security-reports/codeql-report.md
          echo "" >> security-reports/codeql-report.md
          echo "### Scan Date" >> security-reports/codeql-report.md
          echo "$(date -u)" >> security-reports/codeql-report.md
          echo "" >> security-reports/codeql-report.md
          echo "### Languages Analyzed" >> security-reports/codeql-report.md
          echo "- JavaScript" >> security-reports/codeql-report.md
          echo "- TypeScript" >> security-reports/codeql-report.md
          echo "" >> security-reports/codeql-report.md
          echo "### Results" >> security-reports/codeql-report.md
          echo "See GitHub Security tab for detailed findings" >> security-reports/codeql-report.md

  # ===========================================
  # LICENSE COMPLIANCE CHECK
  # ===========================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      github.event.inputs.scan_type == 'full' || 
      github.event.inputs.scan_type == ''

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install license checker
        run: npm install -g license-checker

      - name: Check licenses (root)
        run: |
          license-checker --json > license-report-root.json 2>/dev/null || true
          license-checker --summary 2>/dev/null || echo "License check completed"

      - name: Check licenses (backend)
        run: |
          cd backend
          license-checker --json > ../license-report-backend.json 2>/dev/null || true
          cd ..
          license-checker --summary 2>/dev/null || echo "Backend license check completed"

      - name: Generate license report
        run: |
          mkdir -p security-reports
          echo "## License Compliance Report" > security-reports/license-report.md
          echo "" >> security-reports/license-report.md
          echo "### Scan Date" >> security-reports/license-report.md
          echo "$(date -u)" >> security-reports/license-report.md
          echo "" >> security-reports/license-report.md
          echo "### Root Project Dependencies" >> security-reports/license-report.md
          echo '```json' >> security-reports/license-report.md
          cat license-report-root.json >> security-reports/license-report.md 2>/dev/null || echo "No report"
          echo '```' >> security-reports/license-report.md
          echo "" >> security-reports/license-report.md
          echo "### Backend Dependencies" >> security-reports/license-report.md
          echo '```json' >> security-reports/license-report.md
          cat license-report-backend.json >> security-reports/license-report.md 2>/dev/null || echo "No report"
          echo '```' >> security-reports/license-report.md

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-compliance-report
          path: |
            license-report-root.json
            license-report-backend.json
            security-reports/license-report.md
          retention-days: 30

  # ===========================================
  # SECURITY SUMMARY
  # ===========================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-scan, secret-detection, codeql-analysis, license-check]
    if: always()

    steps:
      - name: Generate security summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Detection | ${{ needs.secret-detection.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL Analysis | ${{ needs.codeql-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Check | ${{ needs.license-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Download detailed reports from the workflow artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Check the Security tab for CodeQL findings" >> $GITHUB_STEP_SUMMARY

      - name: Notify on critical findings
        if: |
          needs.dependency-scan.result == 'failure' ||
          needs.secret-detection.result == 'failure'
        run: |
          echo "::warning::Critical security issues detected. Please review the security scan results immediately."
